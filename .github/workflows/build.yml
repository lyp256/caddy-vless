name: Go

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

env:
  XCADDY_PKG: github.com/caddyserver/xcaddy/cmd/xcaddy@latest
  XCADDY_BIN: $(go env GOPATH)/bin/xcaddy

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          ln -sf "$(go env GOPATH)/bin/golangci-lint" "$(go env GOPATH)/bin/golangci-lint-v2"

      - name: Show Go version
        run: go version

      - name: Run checks
        run: make all-check

      - name: Run tests
        run: make test

  build:
    name: Build CI artifact
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install xcaddy
        run: go install "$XCADDY_PKG"

      - name: Show Go version
        run: go version

      # Regular CI build: produce the default artifact without release packaging.
      - name: Build binary
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy
          path: build/caddy

  release-binaries:
    name: Build release binaries (${{ matrix.arch }})
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install xcaddy
        run: go install "$XCADDY_PKG"

      - name: Show Go version
        run: go version

      # Release packaging only: compress and publish architecture-specific binaries.
      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build release binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p build
          BINARY_NAME="caddy-vless_${VERSION}_linux_${GOARCH}"
          "$XCADDY_BIN" build \
            --with github.com/lyp256/caddy-vless=. \
            --with github.com/caddy-dns/alidns \
            --output "build/${BINARY_NAME}"

      - name: Compress release binary with UPX
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: upx -9 --lzma "build/caddy-vless_${VERSION}_linux_${{ matrix.arch }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/caddy-vless_${{ github.event.release.tag_name }}_linux_${{ matrix.arch }}
