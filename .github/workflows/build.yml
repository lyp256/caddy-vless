name: GO

on: [push,release]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: '^1.23'
      - run: go version

      - name: checkout code
        uses: actions/checkout@v4

      - name: check
        run: make all-check

      - name: test
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: '^1.23'
      - run: go version

      - name: checkout code
        uses: actions/checkout@v4

      - name: build
        run: make build

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: build/