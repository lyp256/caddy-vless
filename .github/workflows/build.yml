name: Go

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Run checks
        run: make all-check

      - name: Run tests
        run: make test

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Show Go version
        run: go version

      - name: Build binary
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy
          path: build/caddy

  release-binaries:
    name: Release binaries (${{ matrix.arch }})
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Show Go version
        run: go version

      - name: Build release binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p build
          BINARY_NAME="caddy-vless_${VERSION}_linux_${GOARCH}"
          "$(go env GOPATH)/bin/xcaddy" build \
            --with github.com/lyp256/caddy-vless=. \
            --with github.com/caddy-dns/alidns \
            --output "build/${BINARY_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/caddy-vless_${{ github.event.release.tag_name }}_linux_${{ matrix.arch }}
